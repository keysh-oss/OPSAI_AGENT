<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Graph Chat</title>
    <script src="https://unpkg.com/cytoscape@3.24.0/dist/cytoscape.min.js"></script>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
      #app { display:flex; height:100vh; }
      #left { width: 420px; padding: 12px; box-sizing:border-box; border-right:1px solid #ddd; }
      #right { flex:1; position:relative; }
      #cy { position:absolute; inset:0; }
      textarea { width:100%; height:100px; }
      .btn { padding:8px 12px; margin-top:8px; }
      pre { background:#f6f8fa; padding:8px; border-radius:4px; max-height:200px; overflow:auto; }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="left">
        <h3>Graph Chat</h3>
        <textarea id="query" placeholder="Ask something like: Show messages that mention JIRA-123 and their authors"></textarea>
        <div>
          <button id="run" class="btn">Run</button>
          <button id="clear" class="btn">Clear</button>
        </div>

        <h4>Cypher</h4>
        <pre id="cypher">(results will appear here)</pre>

        <h4>Records</h4>
        <pre id="records">(records)</pre>
      </div>
      <div id="right"><div id="cy"></div></div>
    </div>

    <script src="/static/app.js"></script>
  </body>
  </html>
